<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration | HB Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/logo-icon.svg" type="image/svg+xml">
</head>
<body class="dashboard-page">
  <nav class="nav nav-simple container">
    <a href="index.html" class="logo">
      <img src="assets/logo.svg" alt="HB Travel" class="logo-img" width="210" height="44">
    </a>
    <div class="nav-actions">
      <a href="index.html" class="btn btn-sm btn-outline-light">Voir le site</a>
      <button type="button" id="logoutBtn" class="btn btn-sm btn-outline-light">Déconnexion</button>
    </div>
  </nav>

  <main class="dashboard-main container admin-main">
    <header class="dashboard-header">
      <span class="section-tag">Administration</span>
      <h1>Dashboard HB Travel</h1>
      <p class="auth-sub">Gérez les séjours affichés sur le site et traitez les demandes clients.</p>
    </header>

    <div class="admin-tabs">
      <button type="button" class="admin-tab active" data-tab="sejours">Séjours phares</button>
      <button type="button" class="admin-tab" data-tab="demandes">Demandes clients</button>
    </div>

    <!-- Panel Séjours -->
    <section id="panel-sejours" class="admin-panel">
      <div class="dashboard-card">
        <h2 id="sejourFormTitle">Ajouter un séjour</h2>
        <form id="sejourForm" class="auth-form admin-form">
          <div class="form-row">
            <label>
              Titre
              <input type="text" name="title" id="sejourTitle" required placeholder="Omra Premium — Makkah & Madinah">
            </label>
            <label>
              Slug (URL interne)
              <input type="text" name="slug" id="sejourSlug" required placeholder="omra-premium">
            </label>
          </div>
          <label>
            Description
            <input type="text" name="description" required placeholder="10 jours · Hôtel 5★ · Guide inclus">
          </label>
          <div class="form-row">
            <label>
              Prix (€)
              <input type="number" name="price" required min="0" step="1" placeholder="1890">
            </label>
            <label>
              Badge
              <input type="text" name="tag" placeholder="Best-seller">
            </label>
          </div>
          <label>
            URL de l'image
            <input type="url" name="image_url" required placeholder="https://images.unsplash.com/...">
          </label>
          <div class="form-row">
            <label>
              Ordre d'affichage
              <input type="number" name="sort_order" value="0" min="0">
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="active" checked> Séjour visible sur le site
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="saveSejourBtn">Ajouter</button>
            <button type="button" class="btn btn-outline-dark" id="cancelSejourBtn">Annuler</button>
          </div>
          <p class="form-note" id="sejourNote"></p>
        </form>
      </div>

      <div class="dashboard-card dashboard-card-wide">
        <h2>Séjours enregistrés</h2>
        <div class="table-wrap">
          <table class="requests-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Séjour</th>
                <th>Prix</th>
                <th>Badge</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="sejoursBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Panel Demandes -->
    <section id="panel-demandes" class="admin-panel" hidden>
      <div class="dashboard-card dashboard-card-wide">
        <h2>Demandes de devis</h2>
        <div class="table-wrap">
          <table class="requests-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Client</th>
                <th>Destination</th>
                <th>Type</th>
                <th>Message</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="requestsAdminBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
