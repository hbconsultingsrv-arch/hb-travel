<!DOCTYPE html>

<html lang="fr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title data-i18n="auth.loginTitle">Connexion | HB Travel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <link rel="stylesheet" href="css/i18n.css">

  <link rel="icon" href="assets/logo-icon.svg" type="image/svg+xml">

</head>

<body class="auth-page">

  <nav class="nav nav-simple container">

    <a href="index.html" class="logo">

      <img src="assets/logo.svg" alt="HB Travel" class="logo-img" width="210" height="44">

    </a>

    <a href="register.html" class="btn btn-sm btn-outline-light" data-i18n="nav.createAccount">Créer un compte</a>

  </nav>



  <main class="auth-main container">

    <div class="auth-card">

      <span class="section-tag" data-i18n="auth.clientSpace">Espace client</span>

      <h1 data-i18n="auth.loginTitle">Connexion</h1>

      <p class="auth-sub" data-i18n="auth.loginSub">Accédez à votre profil et suivez vos demandes de voyage.</p>



      <form id="loginForm" class="auth-form">

        <label>

          <span data-i18n="contact.email">E-mail</span>

          <input type="email" name="email" required data-i18n-placeholder="contact.emailPh" placeholder="vous@email.fr" autocomplete="email">

        </label>

        <label>

          <span data-i18n="auth.password">Mot de passe</span>

          <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password" minlength="6">

        </label>

        <button type="submit" class="btn btn-primary btn-full" data-i18n="auth.loginBtn">Se connecter</button>

        <p class="form-note" id="loginNote"></p>

      </form>



      <p class="auth-switch"><span data-i18n="auth.loginSwitch">Pas encore de compte ?</span> <a href="register.html" data-i18n="auth.loginSwitchLink">Inscrivez-vous</a></p>

    </div>

  </main>



  <script src="js/locales.js"></script>

  <script src="js/i18n.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/config.js"></script>

  <script src="js/supabase-client.js"></script>

  <script src="js/auth.js"></script>

  <script>

    const params = new URLSearchParams(window.location.search);

    const redirect = params.get('redirect') || 'compte.html';



    document.getElementById('loginForm').addEventListener('submit', async (e) => {

      e.preventDefault();

      const note = document.getElementById('loginNote');

      const fd = new FormData(e.target);

      try {

        await signIn(fd.get('email'), fd.get('password'));

        window.location.href = redirect;

      } catch (err) {

        showAlert(note, err.message || t('auth.loginError'));

      }

    });



    getSession().then((s) => { if (s) window.location.href = redirect; });

  </script>

</body>

</html>
